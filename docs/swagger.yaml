          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.ErrorResponse'
      summary: Delete a subscription
      tags:
      - subscriptions
    get:
      parameters:
      - description: Subscription UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.SubscriptionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.ErrorResponse'
      summary: Get subscription by ID
      tags:
      - subscriptions
    patch:
      consumes:
      - application/json
      parameters:
      - description: Subscription UUID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/subscriptions-service_internal_models.UpdateSubscriptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.SubscriptionResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.ErrorResponse'
