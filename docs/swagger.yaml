      tags:
      - subscriptions
  /subscriptions/cost:
    get:
      parameters:
      - description: MM-YYYY
        in: query
        name: period_start
        required: true
        type: string
      - description: MM-YYYY
        in: query
        name: period_end
        required: true
        type: string
      - description: Filter by user UUID
        in: query
        name: user_id
        type: string
      - description: Filter by service name
        in: query
        name: service_name
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.CostResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/subscriptions-service_internal_models.ErrorResponse'
      summary: Calculate total cost for a period
      tags:
      - subscriptions
