version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       subscriptions
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d subscriptions"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      APP_PORT:    8080
      LOG_LEVEL:   info
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     subscriptions
      DB_USER:     postgres
      DB_PASSWORD: postgres
      DB_SSLMODE:  disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data: